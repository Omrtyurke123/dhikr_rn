workflows:
  react-native-android:
    name: React Native Android
    max_build_duration: 60
    environment:
      node: 18.0.0
      java: 17
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Android
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
